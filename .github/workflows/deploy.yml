name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static Next.js app
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Conferir ambiente
        run: |
          echo "=== Node/NPM ==="
          node --version
          npm --version
          echo "=== Pasta atual ==="
          pwd
          echo "=== Arquivos da raiz ==="
          ls -la
          echo "=== package.json ==="
          cat package.json
          echo "=== workflows ==="
          ls -la .github/workflows || true

      - name: Instalar dependências
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Conferir Next instalado
        run: |
          echo "=== node_modules/.bin ==="
          ls -la node_modules/.bin || true
          echo "=== Next version ==="
          ./node_modules/.bin/next --version

      - name: Gerar site estático
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Conferir saída estática
        run: |
          echo "=== Pasta out ==="
          test -d out
          ls -la out

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato do GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
