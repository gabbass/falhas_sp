name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static Next.js app
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Conferir ambiente
        run: |
          node --version
          npm --version
          pwd
          ls -la
          cat package.json

      - name: Limpar cache local do npm
        run: npm cache clean --force

      - name: Instalar dependências
        run: npm install --no-audit --no-fund --legacy-peer-deps
        # 👇 Adicionado: confirma que o install realmente criou o diretório
      
      - name: Verificar se node_modules foi criado
        run: |
          if [ ! -d "node_modules" ]; then
            echo "❌ node_modules NÃO foi criado! O npm install falhou."
            exit 1
          fi
          echo "✅ node_modules existe"
          ls -la node_modules/.bin | head -20

      - name: Conferir Next instalado
        # 👇 Usando npx que é mais robusto que o caminho direto
        run: npx next --version

      - name: Gerar site estático
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Conferir saída estática
        run: |
          test -d out || (echo "❌ Diretório 'out' não foi gerado!" && exit 1)
          ls -la out

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato do GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
